[phases.setup]
nixPkgs = ["php", "nodejs_22"]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm ci || npm install",
  "npm run build",
  "test -f public/build/manifest.json",
  "php artisan migrate --force"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"